kind = "api"
previewPath = "/"
title = "Stock Analyzer"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "Stock Analyzer"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production.run]
args = ["sh", "-c", "cd stock-analyzer && streamlit run app.py --server.port 8080 --server.address 0.0.0.0"]

[services.production.health.startup]
path = "/"
